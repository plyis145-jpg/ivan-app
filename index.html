<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Ivan 1.0</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#050912;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.78);
      --soft:rgba(255,255,255,.35);
      --accent:#16d0c5;
      --app-height:100dvh;
      --safe-top:max(env(safe-area-inset-top), 10px);
      --safe-bottom:max(env(safe-area-inset-bottom), 12px);
      --safe-left:max(env(safe-area-inset-left), 0px);
      --safe-right:max(env(safe-area-inset-right), 0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overscroll-behavior:none
    }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
      background:
        radial-gradient(circle at center, rgba(12,32,56,.16), transparent 52%),
        linear-gradient(to bottom, rgba(3,7,13,.8), transparent, rgba(7,17,32,.7));
    }
    #bg{position:fixed;inset:0;width:100%;height:100%;z-index:0}
    .app{
      position:relative;z-index:2;width:100%;height:var(--app-height);min-height:var(--app-height);overflow:hidden;
      display:flex;flex-direction:column;
      padding:calc(14px + var(--safe-top)) calc(18px + var(--safe-right)) calc(18px + var(--safe-bottom)) calc(18px + var(--safe-left));
    }
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:0 0 auto;color:rgba(255,255,255,.88)}
    .pill{
      border:none;color:white;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px);border-radius:999px;padding:10px 16px;font-size:14px;white-space:nowrap;
      box-shadow:0 8px 24px rgba(0,0,0,.28);
    }
    .top-right{display:flex;gap:8px}
    .content{
      flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:10px 0;
    }
    .inner{
      width:100%;max-width:380px;margin:0 auto;text-align:center;overflow:auto;-webkit-overflow-scrolling:touch;
      padding:10px 2px;scrollbar-width:none;
    }
    .inner::-webkit-scrollbar{display:none}
    h1{
      margin:0 0 28px;font-size:clamp(24px, 5vw, 30px);line-height:1.28;font-weight:300;letter-spacing:-.02em;color:var(--text)
    }
    .lines{
      display:flex;flex-direction:column;gap:20px;color:var(--muted);font-size:clamp(19px, 4.5vw, 24px);
      line-height:1.42;letter-spacing:-.03em;font-weight:300;
    }
    .lines p{margin:0}
    .bottom{flex:0 0 auto;padding-top:10px}
    .dots{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:22px;min-height:26px}
    .dotWrap{display:flex;align-items:center;justify-content:center;cursor:pointer}
    .bar{height:2px;width:38px;background:rgba(255,255,255,.12);border-radius:999px;transition:.25s}
    .dotWrap.active .bar{width:62px;background:rgba(34,211,238,.7)}
    .orb{
      display:none;width:18px;height:18px;border-radius:50%;margin-left:-30px;background:var(--accent);
      box-shadow:0 0 22px rgba(34,211,238,.75)
    }
    .dotWrap.active .orb{display:block}
    .cta{
      width:100%;border:none;border-radius:28px;padding:19px 18px;font-size:clamp(20px, 4.8vw, 24px);line-height:1.15;
      letter-spacing:-.02em;font-weight:500;color:white;background:var(--accent);
      box-shadow:0 12px 34px rgba(22,220,210,.18);transition:transform .2s ease, box-shadow .2s ease;
    }
    .cta:active{transform:scale(.985);box-shadow:0 0 34px rgba(22,220,210,.45)}
    .hint{margin-top:12px;text-align:center;font-size:12px;color:var(--soft)}
    @media (max-width:420px){
      .app{padding-left:calc(14px + var(--safe-left));padding-right:calc(14px + var(--safe-right))}
      .pill{padding:9px 14px;font-size:13px}
    }
    @media (max-height:740px){
      .content{align-items:flex-start}
      h1{margin-bottom:20px}
      .lines{gap:16px}
      .dots{margin-bottom:16px}
      .hint{display:none}
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="app" id="swipeArea">
    <div class="top">
      <button class="pill" onclick="closeApp()">✕ Закрыть</button>
      <div class="top-right">
        <button class="pill" type="button">⌄</button>
        <button class="pill" type="button">•••</button>
      </div>
    </div>
    <div class="content">
      <div class="inner">
        <h1 id="title"></h1>
        <div class="lines" id="lines"></div>
      </div>
    </div>
    <div class="bottom">
      <div class="dots" id="dots"></div>
      <button class="cta" id="ctaBtn"></button>
      <div class="hint">Свайпай влево или вправо, чтобы переключать экраны</div>
    </div>
  </div>

  <script>
    const slides = [
      {
        title: "Каждое утро — практика 10–15 минут.",
        lines: [
          "Ты входишь в состояние ясности и присутствия.",
          "Фиксируешь точное действие, которое откликается из этого состояния — и делаешь его днём.",
          "За 3 дня поймёшь — твоё это или нет.",
          "Зайдёт — продолжишь.",
          "Не зайдёт — просто остановишься."
        ],
        cta: "Попробовать за 99₽"
      },
      {
        title: "Без надрыва. Без пустой мотивации.",
        lines: [
          "Только короткая практика и одно точное действие на день.",
          "Ты не ломаешь себя, а начинаешь слышать себя яснее.",
          "Нужен не идеальный ты — нужен настоящий ты."
        ],
        cta: "Начать 3-дневный доступ"
      },
      {
        title: "Проверь на себе.",
        lines: [
          "3 дня — чтобы почувствовать состояние и посмотреть, что изменится внутри дня.",
          "Подойдёт — пойдёшь дальше.",
          "Не подойдёт — просто выйдешь без лишнего давления."
        ],
        cta: "Открыть практику"
      }
    ];

    let active = 0;
    let touchStartX = null;

    const titleEl = document.getElementById("title");
    const linesEl = document.getElementById("lines");
    const ctaBtn = document.getElementById("ctaBtn");
    const dotsEl = document.getElementById("dots");
    const swipeArea = document.getElementById("swipeArea");

    function setViewportHeight() {
      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      let h = window.innerHeight;
      if (tg) {
        if (tg.viewportStableHeight) h = tg.viewportStableHeight;
        else if (tg.viewportHeight) h = tg.viewportHeight;
      }
      document.documentElement.style.setProperty("--app-height", h + "px");
    }

    function render() {
      const slide = slides[active];
      titleEl.textContent = slide.title;
      linesEl.innerHTML = slide.lines.map(line => `<p>${line}</p>`).join("");
      ctaBtn.textContent = slide.cta;
      dotsEl.innerHTML = slides.map((_, i) => `
        <div class="dotWrap ${i === active ? "active" : ""}" onclick="goTo(${i})">
          <div class="bar"></div>
          <div class="orb"></div>
        </div>
      `).join("");
    }

    function goTo(index) {
      active = index;
      render();
    }

    function closeApp() {
      const tg = window.Telegram?.WebApp;
      if (tg?.close) tg.close();
    }

    ctaBtn.addEventListener("click", () => {
      const tg = window.Telegram?.WebApp;
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
      if (tg?.showPopup) {
        tg.showPopup({
          title: "Демо-экран",
          message: "Теперь экран адаптирован для телефонов. Следующим шагом можно подключить оплату или регистрацию.",
          buttons: [{ type: "ok", text: "Понятно" }]
        });
      } else {
        alert("Теперь экран адаптирован для телефонов. Следующим шагом можно подключить оплату или регистрацию.");
      }
    });

    swipeArea.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });

    swipeArea.addEventListener("touchend", (e) => {
      if (touchStartX === null) return;
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (delta < -40 && active < slides.length - 1) active += 1;
      if (delta > 40 && active > 0) active -= 1;
      touchStartX = null;
      render();
    }, { passive: true });

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try {
        tg.setHeaderColor("#060b14");
        tg.setBackgroundColor("#060b14");
      } catch (e) {}
      if (tg.onEvent) tg.onEvent("viewportChanged", setViewportHeight);
    }

    window.addEventListener("resize", setViewportHeight);
    window.addEventListener("orientationchange", () => setTimeout(setViewportHeight, 120));

    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.min(90, Math.floor((width * height) / 13500));
      particles = Array.from({ length: count }).map(() => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 2.4 + 0.6,
        a: Math.random() * 0.65 + 0.15,
        dx: (Math.random() - 0.5) * 0.18,
        dy: (Math.random() - 0.5) * 0.18,
        pulse: Math.random() * Math.PI * 2
      }));
    }

    function draw(t = 0) {
      const width = window.innerWidth;
      const height = window.innerHeight;

      const gradient = ctx.createRadialGradient(
        width * 0.5, height * 0.55, 20,
        width * 0.5, height * 0.55, Math.max(width, height) * 0.8
      );
      gradient.addColorStop(0, "rgba(14,31,58,0.20)");
      gradient.addColorStop(0.5, "rgba(6,11,20,0.90)");
      gradient.addColorStop(1, "rgba(4,7,14,1)");

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (const p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        p.pulse += 0.02;

        if (p.x < -10) p.x = width + 10;
        if (p.x > width + 10) p.x = -10;
        if (p.y < -10) p.y = height + 10;
        if (p.y > height + 10) p.y = -10;

        const alpha = p.a * (0.7 + Math.sin(p.pulse + t * 0.0012) * 0.3);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(20, 222, 208, ${alpha})`;
        ctx.shadowBlur = 14;
        ctx.shadowColor = "rgba(20, 222, 208, 0.55)";
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      requestAnimationFrame(draw);
    }

    setViewportHeight();
    resizeCanvas();
    render();
    draw();

    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
