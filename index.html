<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivan 1.0</title>
  <style>
    :root{
      --bg:#050912;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.78);
      --soft:rgba(255,255,255,.35);
      --accent:#16d0c5;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:white;overflow:hidden}
    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(circle at center, rgba(12,32,56,.16), transparent 52%),
        linear-gradient(to bottom, rgba(3,7,13,.8), transparent, rgba(7,17,32,.7));
      pointer-events:none;
      z-index:1;
    }
    #bg{position:fixed; inset:0; width:100%; height:100%; z-index:0}
    .app{position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; padding:20px 20px 28px}
    .top{display:flex; align-items:center; justify-content:space-between; color:rgba(255,255,255,.85)}
    .pill{
      border:none; color:white; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(12px); border-radius:999px; padding:10px 16px; font-size:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.28);
    }
    .top-right{display:flex; gap:8px}
    .content{flex:1; display:flex; flex-direction:column; justify-content:center}
    .inner{max-width:360px; margin:0 auto; text-align:center}
    h1{
      margin:0 0 34px; font-size:26px; line-height:1.34; font-weight:300; letter-spacing:-.02em; color:var(--text)
    }
    .lines{display:flex; flex-direction:column; gap:24px; color:var(--muted); font-size:22px; line-height:1.45; letter-spacing:-.03em; font-weight:300}
    .bottom{padding-bottom:4px}
    .dots{display:flex; justify-content:center; align-items:center; gap:14px; margin-bottom:28px}
    .dotWrap{display:flex; align-items:center; justify-content:center; cursor:pointer}
    .bar{height:2px; width:40px; background:rgba(255,255,255,.12); border-radius:999px; transition:.25s}
    .dotWrap.active .bar{width:64px; background:rgba(34,211,238,.7)}
    .orb{
      display:none;
      width:20px; height:20px; border-radius:50%; margin-left:-32px;
      background:var(--accent); box-shadow:0 0 22px rgba(34,211,238,.75)
    }
    .dotWrap.active .orb{display:block}
    .cta{
      width:100%; border:none; border-radius:28px; padding:20px 18px; font-size:23px; line-height:1.1;
      letter-spacing:-.02em; font-weight:500; color:white; background:var(--accent);
      box-shadow:0 12px 34px rgba(22,220,210,.18); transition:transform .2s ease, box-shadow .2s ease;
    }
    .cta:active{transform:scale(.985); box-shadow:0 0 34px rgba(22,220,210,.45)}
    .hint{margin-top:14px; text-align:center; font-size:13px; color:var(--soft)}
    @media (max-width:380px){
      .app{padding-left:16px;padding-right:16px}
      h1{font-size:23px}
      .lines{font-size:20px}
      .cta{font-size:21px}
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="app" id="swipeArea">
    <div class="top">
      <button class="pill" onclick="closeApp()">✕ Закрыть</button>
      <div class="top-right">
        <button class="pill">⌄</button>
        <button class="pill">•••</button>
      </div>
    </div>

    <div class="content">
      <div class="inner">
        <h1 id="title"></h1>
        <div class="lines" id="lines"></div>
      </div>
    </div>

    <div class="bottom">
      <div class="dots" id="dots"></div>
      <button class="cta" id="ctaBtn"></button>
      <div class="hint">Свайпай влево или вправо, чтобы переключать экраны</div>
    </div>
  </div>

  <script>
    const slides = [
      {
        title: "Каждое утро — практика 10–15 минут.",
        lines: [
          "Ты входишь в состояние ясности и присутствия.",
          "Фиксируешь точное действие, которое откликается из этого состояния — и делаешь его днём.",
          "За 3 дня поймёшь — твоё это или нет.",
          "Зайдёт — продолжишь.",
          "Не зайдёт — просто остановишься."
        ],
        cta: "Попробовать за 99₽"
      },
      {
        title: "Без надрыва. Без пустой мотивации.",
        lines: [
          "Только короткая практика и одно точное действие на день.",
          "Ты не ломаешь себя, а начинаешь слышать себя яснее.",
          "Нужен не идеальный ты — нужен настоящий ты."
        ],
        cta: "Начать 3-дневный доступ"
      },
      {
        title: "Проверь на себе.",
        lines: [
          "3 дня — чтобы почувствовать состояние и посмотреть, что изменится внутри дня.",
          "Подойдёт — пойдёшь дальше.",
          "Не подойдёт — просто выйдешь без лишнего давления."
        ],
        cta: "Открыть практику"
      }
    ];

    let active = 0;
    const titleEl = document.getElementById("title");
    const linesEl = document.getElementById("lines");
    const ctaBtn = document.getElementById("ctaBtn");
    const dotsEl = document.getElementById("dots");
    const swipeArea = document.getElementById("swipeArea");
    let touchStartX = null;

    function render() {
      const slide = slides[active];
      titleEl.textContent = slide.title;
      linesEl.innerHTML = slide.lines.map(line => `<p>${line}</p>`).join("");
      ctaBtn.textContent = slide.cta;
      dotsEl.innerHTML = slides.map((_, i) => `
        <div class="dotWrap ${i === active ? "active" : ""}" onclick="goTo(${i})">
          <div class="bar"></div>
          <div class="orb"></div>
        </div>
      `).join("");
    }

    function goTo(index) {
      active = index;
      render();
    }

    function closeApp() {
      const tg = window.Telegram?.WebApp;
      if (tg && tg.close) tg.close();
    }

    ctaBtn.addEventListener("click", () => {
      const tg = window.Telegram?.WebApp;
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
      if (tg?.showPopup) {
        tg.showPopup({
          title: "Демо-экран",
          message: "Здесь можно открыть оплату, регистрацию или следующую практику.",
          buttons: [{ type: "ok", text: "Понятно" }]
        });
      } else {
        alert("Здесь можно открыть оплату, регистрацию или следующую практику.");
      }
    });

    swipeArea.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
    });

    swipeArea.addEventListener("touchend", (e) => {
      if (touchStartX === null) return;
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (delta < -40 && active < slides.length - 1) active += 1;
      if (delta > 40 && active > 0) active -= 1;
      touchStartX = null;
      render();
    });

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try {
        tg.setHeaderColor("#060b14");
        tg.setBackgroundColor("#060b14");
      } catch (e) {}
    }

    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    let particles = [];
    let animationFrame;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.min(80, Math.floor((width * height) / 14000));
      particles = Array.from({ length: count }).map(() => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 2.4 + 0.6,
        a: Math.random() * 0.65 + 0.15,
        dx: (Math.random() - 0.5) * 0.18,
        dy: (Math.random() - 0.5) * 0.18,
        pulse: Math.random() * Math.PI * 2
      }));
    }

    function draw(t = 0) {
      const width = window.innerWidth;
      const height = window.innerHeight;

      const gradient = ctx.createRadialGradient(
        width * 0.5, height * 0.55, 20,
        width * 0.5, height * 0.55, Math.max(width, height) * 0.8
      );
      gradient.addColorStop(0, "rgba(14,31,58,0.18)");
      gradient.addColorStop(0.5, "rgba(6,11,20,0.88)");
      gradient.addColorStop(1, "rgba(4,7,14,1)");

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (const p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        p.pulse += 0.02;

        if (p.x < -10) p.x = width + 10;
        if (p.x > width + 10) p.x = -10;
        if (p.y < -10) p.y = height + 10;
        if (p.y > height + 10) p.y = -10;

        const alpha = p.a * (0.7 + Math.sin(p.pulse + t * 0.0012) * 0.3);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(20, 222, 208, ${alpha})`;
        ctx.shadowBlur = 14;
        ctx.shadowColor = "rgba(20, 222, 208, 0.55)";
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      animationFrame = requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    resize();
    draw();
    render();
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
